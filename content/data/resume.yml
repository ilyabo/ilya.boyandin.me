profile:
  name: Ilya Boyandin
  subtitle: Software Engineer | Interactive Systems & Data Visualization
  image: /profile-pic.jpg
  contacts:
    - label: ilya@boyandin.me
      href: mailto:ilya@boyandin.me
    - label: GitHub
      href: https://github.com/ilyabo
    - label: LinkedIn
      href: https://www.linkedin.com/in/ilyabo/
summary: >-
  Experienced software engineer with a PhD in Computer Science and many years of
  expertise in scalable web architectures, interactive front-end development,
  geospatial analytics, and data visualization. Passionate about leveraging AI
  and large-scale models to create transformative user experiences.
sections:
  - id: executive-summary
    title: Executive Summary
    type: bullets
    short: true
    items:
      - short: true
        text: >-
          20+ years of experience in software engineering with deep expertise in
          data visualization, front-end development, distributed systems, and
          technical leadership.
      - short: true
        text: PhD in Computer Science with focus on data visualization and interactive systems.
      - short: true
        text: >-
          Experience with ML systems including statistical classification,
          question answering, natural language processing for chatbots, data
          processing pipelines, and real-time ML model integration.
      - short: true
        text: Experience architecting and scaling real-time collaborative systems.
      - short: false
        text: >-
          Track record of leading technical teams and mentoring engineers while
          driving technical excellence and innovation. Led development of
          multiple large-scale web applications serving thousands of users.

  - id: education
    title: Education
    type: education
    short: true
    items:
      - short: true
        title: PhD in Computer Science
        institution: University of Fribourg
        date: 2013
        details:
          - short: true
            label: Thesis title
            text: "[Visualization of Temporal Origin-Destination Data](/assets/thesis.pdf)"
          - short: false
            label: Supervised by
            text: "[Enrico Bertini](https://enrico.bertini.io/) and [Denis Lalanne](https://human-ist.unifr.ch/en/institute/team/denis-lalanne.html)"
          - short: false
            label: Summary
            text: >-
              Carried out an [in-depth study](/assets/thesis.pdf) of temporal
              origin-destination data which can represent movement of people,
              energy, material, etc. between locations in geographic space.
              Developed [Flowstrates](/p/flowstrates), a novel approach for
              visualizing and exploring temporal origin-destination data.
              Carried out a qualitative [user study](/p/flowmap-user-study)
              comparing animated and small-multiple representations of changes
              in flow maps.
      - short: true
        title: MSc Computer Science
        institution: St. Petersburg State University
        date: 2003
        details:
          - short: true
            label: Thesis title
            text: Statistical Query Transformations for Question Answering in the Web
          - short: false
            label: Supervised by
            text: "[Igor Nekrestyanov](https://www.linkedin.com/in/igornekrestyanov/)"
          - short: false
            label: Summary
            text: >-
              Developed an [improvement for a state-of-the-art machine learning
              approach](/p/simqa) transforming natural language questions into
              search engine queries achieving a better quality of
              [question answering](http://en.wikipedia.org/wiki/Question_answering).

